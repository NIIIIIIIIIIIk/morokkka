<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a; --text: #fff; --text2: #888; --accent: #e50914; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px solid var(--accent); margin-bottom: 30px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 24px; font-weight: normal; }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; font-family: 'Courier New', monospace; font-size: 11px; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
        button:hover { border-color: var(--accent); color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: var(--bg2); border: 1px solid var(--border); padding: 20px; display: flex; align-items: center; gap: 12px; }
        .stat-icon { font-size: 28px; }
        .stat-label { color: var(--text2); font-size: 10px; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--accent); }
        .section { background: var(--bg2); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
        .section h2 { font-size: 16px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .devices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
        .device-card { background: var(--bg3); padding: 14px; }
        .device-card h3 { font-size: 13px; margin-bottom: 12px; color: var(--text2); }
        .stat-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .stat-name { color: var(--text2); font-size: 11px; min-width: 70px; }
        .stat-bar { flex: 1; height: 4px; background: var(--border); }
        .stat-bar-fill { height: 100%; background: var(--accent); }
        .stat-count { font-size: 12px; font-weight: bold; }
        .chart-container { height: 280px; }
        .table-container { overflow: auto; max-height: 400px; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text2); font-size: 10px; position: sticky; top: 0; background: var(--bg2); }
        td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; }
        .danger-zone { border-color: var(--accent); }
        .danger-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .danger-btn { border-color: var(--accent); color: var(--accent); }
        .danger-btn:hover { background: var(--accent); color: #fff; }
        .status { margin-top: 14px; padding: 10px; background: var(--bg3); font-size: 11px; }
        .status.ok { border-left: 3px solid #00c853; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>🎬 ANALYTICS</h1>
        <div class="header-actions">
            <button onclick="location.href='/'">← САЙТ</button>
            <button onclick="loadData()">🔄 ОБНОВИТЬ</button>
        </div>
    </header>

    <div id="syncInfo" style="background:#1a1a1a;border:1px solid #e6b450;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#e6b450;"></div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-info"><div class="stat-label">Всего визитов</div><div class="stat-value" id="totalVisits">0</div></div></div>
        <div class="stat-card"><div class="stat-icon">🖥️</div><div class="stat-info"><div class="stat-label">Desktop</div><div class="stat-value" id="desktopCount">0</div></div></div>
        <div class="stat-card"><div class="stat-icon">📱</div><div class="stat-info"><div class="stat-label">Mobile</div><div class="stat-value" id="mobileCount">0</div></div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-info"><div class="stat-label">Tablet</div><div class="stat-value" id="tabletCount">0</div></div></div>
    </div>

    <div class="section">
        <h2>📱 Устройства и браузеры</h2>
        <div class="devices-grid">
            <div class="device-card"><h3>По устройствам</h3><div id="deviceStats"></div></div>
            <div class="device-card"><h3>По браузерам</h3><div id="browserStats"></div></div>
            <div class="device-card"><h3>По ОС</h3><div id="osStats"></div></div>
        </div>
    </div>

    <div class="section">
        <h2>📈 Активность по дням</h2>
        <div class="chart-container"><canvas id="visitsChart"></canvas></div>
    </div>

    <div class="section">
        <h2>📋 Последние визиты</h2>
        <div class="table-container">
            <table><thead><tr><th>Время</th><th>Страница</th><th>Устройство</th><th>Браузер</th><th>ОС</th><th>Экран</th><th>Язык</th></tr></thead><tbody id="visitsBody"></tbody></table>
        </div>
    </div>
</div>

<script>
// ============ ЗАЩИТА ============
var KEY = 'spice-melange-8472';
var p = new URLSearchParams(location.search);
if (p.get('key') !== KEY && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#0a0a0a;color:#888;font-family:monospace"><div style="text-align:center"><h1 style="font-size:72px;color:#e50914">404</h1><p>File not found</p></div></div>';
    throw new Error('no');
}

// ============ КОНФИГ ============
var API_URL = 'http://nikitv86.beget.tech/api.php';
var chart = null;

// ============ ЗАГРУЗКА ДАННЫХ ============
async function loadData() {
    try {
        var r = await fetch(API_URL);
        var visits = await r.json();
        
        if (!visits || !visits.length) {
            document.getElementById('syncInfo').innerHTML = '⚠️ Нет данных в базе';
            return;
        }
        
        // Собираем статистику
        var stats = {
            total: visits.length,
            desktop: 0,
            mobile: 0,
            tablet: 0,
            devices: {},
            browsers: {},
            os: {},
            daily: {}
        };
        
        for (var i = 0; i < visits.length; i++) {
            var v = visits[i];
            
            stats.devices[v.device] = (stats.devices[v.device] || 0) + 1;
            if (v.device === 'Desktop') stats.desktop++;
            if (v.device === 'Mobile') stats.mobile++;
            if (v.device === 'Tablet') stats.tablet++;
            
            stats.browsers[v.browser] = (stats.browsers[v.browser] || 0) + 1;
            stats.os[v.os] = (stats.os[v.os] || 0) + 1;
            
            var day = v.created_at ? v.created_at.split(' ')[0] : '';
            if (day) stats.daily[day] = (stats.daily[day] || 0) + 1;
        }
        
        // Отображаем
        document.getElementById('totalVisits').textContent = stats.total;
        document.getElementById('desktopCount').textContent = stats.desktop;
        document.getElementById('mobileCount').textContent = stats.mobile;
        document.getElementById('tabletCount').textContent = stats.tablet;
        
        var lastVisit = visits[visits.length - 1];
        var lastTime = lastVisit && lastVisit.created_at ? new Date(lastVisit.created_at).toLocaleString('ru-RU') : '—';
        document.getElementById('syncInfo').innerHTML = '🟢 Beget MySQL | Всего: ' + stats.total + ' | Последний: ' + lastTime;
        
        showStats('deviceStats', stats.devices, stats.total);
        showStats('browserStats', stats.browsers, stats.total);
        showStats('osStats', stats.os, stats.total);
        showChart(stats.daily);
        showTable(visits.slice(-100).reverse());
        
    } catch(e) {
        document.getElementById('syncInfo').innerHTML = '❌ Ошибка: ' + e.message;
    }
}

function showStats(id, data, total) {
    var items = [];
    for (var k in data) items.push({name: k, count: data[k]});
    items.sort(function(a, b) { return b.count - a.count; });
    
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var pct = ((items[i].count / total) * 100).toFixed(1);
        html += '<div class="stat-item"><span class="stat-name">' + items[i].name + '</span><div class="stat-bar"><div class="stat-bar-fill" style="width:' + pct + '%"></div></div><span class="stat-count">' + items[i].count + '</span></div>';
    }
    document.getElementById(id).innerHTML = html || '<div class="stat-item">Нет данных</div>';
}

function showChart(daily) {
    var dates = Object.keys(daily).sort();
    var vals = dates.map(function(k) { return daily[k]; });
    
    var ctx = document.getElementById('visitsChart').getContext('2d');
    if (chart) chart.destroy();
    
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates.length ? dates : ['Нет'],
            datasets: [{label: 'Визиты', data: vals.length ? vals : [0], borderColor: '#e50914', backgroundColor: 'rgba(229,9,20,0.1)', tension: 0.2, fill: true, pointRadius: 3}]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {legend: {labels: {color: '#fff'}}},
            scales: {y: {beginAtZero: true, grid: {color: '#333'}, ticks: {color: '#888'}}, x: {grid: {color: '#333'}, ticks: {color: '#888'}}}
        }
    });
}

function showTable(visits) {
    var html = '';
    for (var i = 0; i < visits.length; i++) {
        var v = visits[i];
        var time = v.created_at ? new Date(v.created_at.replace(' ', 'T')).toLocaleString('ru-RU') : '—';
        html += '<tr><td>' + time + '</td><td>' + (v.page||'—') + '</td><td>' + (v.device||'—') + '</td><td>' + (v.browser||'—') + '</td><td>' + (v.os||'—') + '</td><td>' + (v.screen||'—') + '</td><td>' + (v.lang||'—') + '</td></tr>';
    }
    document.getElementById('visitsBody').innerHTML = html || '<tr><td colspan="7" style="text-align:center;padding:40px">Нет данных</td></tr>';
}

// ============ ЗАПУСК ============
loadData();
setInterval(loadData, 10000);
</script>

</body>
</html>
